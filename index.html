<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boas Vindas - NoCode</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1.1rem;
      color: #aaa;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #fff;
      margin: 2rem auto;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">NoCode</div>
    <h1>Boas<br>Vindas</h1>
    <div class="divider"></div>
    <p>Seja bem-vindo à sua jornada. Estamos felizes em ter você aqui.</p>
  </div>
</body>
</html>
